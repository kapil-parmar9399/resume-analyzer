{% extends "base.html" %}
{% block content %}

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="mb-2">Create your account</h3>
                <p class="text-muted">Start analyzing resumes like a pro.</p>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form action="/register" method="post" class="d-flex flex-column gap-3">
                    <input class="form-control" type="text" name="name" placeholder="Full Name" required>
                    <input class="form-control" type="email" name="email" placeholder="Email" required>
                    <input class="form-control" type="password" name="password" placeholder="Password" required>
                    <button class="btn btn-primary w-100">Register</button>
                </form>

                <p class="text-center mt-3">Already have an account? <a href="/login">Login here</a></p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
