{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Your Resume Reports - {{ user.name }}</h2>

    {% if resumes %}
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Filename</th>
                <th>Skills</th>
                <th>Score</th>
                <th>Download</th>
            </tr>
        </thead>
        <tbody>
            {% for r in resumes %}
            <tr>
                <td>{{ r.filename }}</td>
                <td>{{ r.skills | join(", ") }}</td>
                <td>{{ r.score }}</td>
            <td>
    <!-- PDF Download Button -->
    <a href="/download/{{ r.filename }}" 
       class="btn btn-primary btn-sm" 
       style="padding: 0.25rem 0.75rem; font-size: 0.875rem; line-height: 1.5; border-radius: 0.25rem;">
       PDF
    </a>
</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p>No resumes uploaded yet.</p>
    {% endif %}
</div>
{% endblock %}
