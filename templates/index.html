{% extends "base.html" %}
{% block content %}

<div class="container">
    
    <h2 class="mb-4">Upload Resume</h2>

    {% if user %}
    
    <form action="/upload" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <input 
                class="form-control"
                type="file"
                name="file"
                accept=".pdf,.docx"
                required
            >
        </div>

        <button class="btn btn-primary">Upload</button>
    </form>

    {% else %}

    <div class="alert alert-warning">
        Please <a href="/login">login</a> to upload your resume.
    </div>

    {% endif %}

</div>

{% endblock %}
